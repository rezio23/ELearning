<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/studyoncampus.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bayon&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakra E-Learning</title>
</head>

<!-- Header -->
<header>
    <div class="header-contact">
        <div class="contact-left">
            <div class="header-call">
                <i class="fa-solid fa-phone"></i>
                <a href="#">+855 12 233 344</a>
            </div>
            <div class="header-mail">
                <i class="fa-solid fa-envelope"></i>
                <a href="#">username@gmail.com</a>
            </div>
        </div>
        <div class="contact-right">
            <div class="header-location">
                <i class="fa-solid fa-location-dot"></i>
                <a href="#">Location</a>
            </div>
            <div class="header-location">
                <i class="fa-solid fa-robot"></i>
                <a href="#">Support</a>
            </div>
        </div>
    </div>
    <div class="header-ul">
        <div class="logo">
            <a href="#">ចក្រា</a>
        </div>
        <ul>
            <li><a href="#">ដំបូង</a></li>
            <li><a href="#">ទំព័រ</a></li>
            <li><a href="#">វគ្គសិក្សា</a></li>
            <li><a href="#">ប្លុក</a></li>
            <li><a href="#">ទំនិញ</a></li>
        </ul>
        <div class="header-actions">
            <div class="header-search">
                <img src="../asset/svg/search.svg" class="icon" alt="search">
                <input type="text" placeholder="ស្វែងរក...">
            </div>
            <button><a href="#">ចូល</a></button>
        </div>
    </div>
</header>

<div class="container">
    <div class="container-left">
        <div class="message">
            <h2 class="form-title">Send Me A Message</h2>
            <form class="contact-form">
                <div class="form-row">
                    <div class="input-field">
                        <label>ឈ្មោះ</label>
                        <input type="text" placeholder="វិឈាន សម្បត្តិ">
                    </div>
                    <div class="input-field">
                        <label>អ៊ីម៉ែល</label>
                        <input type="email" placeholder="contact@bsiteagency.com">
                    </div>
                </div>

                <div class="input-field full-width">
                    <label>ប្រធានបទ</label>
                    <input type="text" placeholder="Subject">
                </div>

                <div class="input-field full-width">
                    <label>សារ</label>
                    <textarea placeholder="Message"></textarea>
                </div>

                <div class="form-footer">
                    <button type="submit" class="submit-btn">ផ្ញើរសារ</button>
                </div>
            </form>
        </div>
    </div>
</div>

<body>
    <script src="../jquery.js"></script>
    <script src="../script/studyoncampus.js"></script>
</body>

</html>
